<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Season3 Amtrak VR</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<style>
html, body {
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:"Malgun Gothic", sans-serif;
    background:#000;
}

#panorama {
    width:100%;
    height:100vh;
}

.title-box {
    position:absolute;
    top:18px;
    left:18px;
    z-index:999;
    background:rgba(0,0,0,.6);
    color:white;
    padding:12px 18px;
    border-radius:10px;
    font-size:18px;
    line-height:1.5;
}

/* Pannellum 기본 핫스팟 이미지 완전 제거 */
.pnlm-hotspot-base {
    background:none !important;
    background-image:none !important;
    border:none !important;
    opacity:1 !important;
}

/* 흰색 원형 바탕 + 검정 화살표 */
.bigArrow {
    width:120px !important;
    height:120px !important;
    border-radius:50% !important;
    background:#ffffff !important;
    background-image:none !important;
    border:4px solid rgba(0,0,0,.18) !important;
    box-shadow:0 0 22px rgba(0,0,0,.55) !important;
    display:flex !important;
    justify-content:center !important;
    align-items:center !important;
    opacity:1 !important;
    color:#000000 !important;
    font-size:0 !important;
}

/* 실제 화살표 글자 */
.bigArrow span {
    color:#000000 !important;
    font-size:76px !important;
    font-weight:900 !important;
    line-height:1 !important;
    display:block !important;
    margin-top:-6px;
}

/* 모바일 */
@media(max-width:768px) {
    .bigArrow {
        width:270px !important;
        height:270px !important;
        border:6px solid rgba(0,0,0,.18) !important;
        box-shadow:0 0 28px rgba(0,0,0,.65) !important;
    }

    .bigArrow span {
        font-size:150px !important;
        margin-top:-10px;
    }

    .title-box {
        font-size:14px;
        padding:8px 12px;
        top:12px;
        left:12px;
    }
}
</style>
</head>

<body>

<div class="title-box">
Season3 Amtrak VR<br>
워싱턴 → 뉴욕 탑승 체험
</div>

<div id="panorama"></div>

<script>
var viewer = pannellum.viewer('panorama', {
    "default": {
        "firstScene": "VR1",
        "sceneFadeDuration": 1000,
        "autoLoad": true,
        "showControls": true,
        "compass": false
    },

    "scenes": {
        "VR1": {
            "title": "VR1 — 플랫폼에서 본 암트랙 외관",
            "type": "equirectangular",
            "panorama": "images/VR1_platform.png",
            "hotSpots": [
                {
                    "pitch": -6,
                    "yaw": 25,
                    "type": "scene",
                    "text": "열차 탑승하기",
                    "sceneId": "VR2",
                    "cssClass": "bigArrow",
                    "createTooltipFunc": hotspot,
                    "createTooltipArgs": "↑"
                }
            ]
        },

        "VR2": {
            "title": "VR2 — Coachclass 입구 계단 앞",
            "type": "equirectangular",
            "panorama": "images/VR2_coach_entrance.png",
            "hotSpots": [
                {
                    "pitch": -5,
                    "yaw": 0,
                    "type": "scene",
                    "text": "계단 올라가기",
                    "sceneId": "VR3",
                    "cssClass": "bigArrow",
                    "createTooltipFunc": hotspot,
                    "createTooltipArgs": "↑"
                },
                {
                    "pitch": -8,
                    "yaw": 180,
                    "type": "scene",
                    "text": "플랫폼 돌아가기",
                    "sceneId": "VR1",
                    "cssClass": "bigArrow",
                    "createTooltipFunc": hotspot,
                    "createTooltipArgs": "↓"
                }
            ]
        },

        "VR3": {
            "title": "VR3 — 계단 위 / 객실 출입문 앞",
            "type": "equirectangular",
            "panorama": "images/VR3_doorway.png",
            "hotSpots": [
                {
                    "pitch": 0,
                    "yaw": 0,
                    "type": "scene",
                    "text": "객실 들어가기",
                    "sceneId": "VR4",
                    "cssClass": "bigArrow",
                    "createTooltipFunc": hotspot,
                    "createTooltipArgs": "↑"
                },
                {
                    "pitch": -18,
                    "yaw": 180,
                    "type": "scene",
                    "text": "계단 내려가기",
                    "sceneId": "VR2",
                    "cssClass": "bigArrow",
                    "createTooltipFunc": hotspot,
                    "createTooltipArgs": "↓"
                }
            ]
        },

        "VR4": {
            "title": "VR4 — 객실 입구에서 바라본 객실",
            "type": "equirectangular",
            "panorama": "images/VR4_cabin.png",
            "hotSpots": [
                {
                    "pitch": -3,
                    "yaw": 8,
                    "type": "scene",
                    "text": "부부 좌석으로 이동",
                    "sceneId": "VR5",
                    "cssClass": "bigArrow",
                    "createTooltipFunc": hotspot,
                    "createTooltipArgs": "↑"
                },
                {
                    "pitch": -5,
                    "yaw": 180,
                    "type": "scene",
                    "text": "출입문으로 돌아가기",
                    "sceneId": "VR3",
                    "cssClass": "bigArrow",
                    "createTooltipFunc": hotspot,
                    "createTooltipArgs": "↓"
                }
            ]
        },

        "VR5": {
            "title": "VR5 — 부부 좌석 착석 장면",
            "type": "equirectangular",
            "panorama": "images/VR5_couple_seat.png",
            "hotSpots": [
                {
                    "pitch": -5,
                    "yaw": 180,
                    "type": "scene",
                    "text": "객실 입구로 돌아가기",
                    "sceneId": "VR4",
                    "cssClass": "bigArrow",
                    "createTooltipFunc": hotspot,
                    "createTooltipArgs": "↓"
                }
            ]
        }
    }
});

function hotspot(div, args) {
    div.innerHTML = "<span>" + args + "</span>";
}
</script>

</body>
</html>
