<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Season3 Amtrak VR</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">

<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:"Malgun Gothic",sans-serif;
}

#panorama{
    width:100%;
    height:100vh;
}

.title-box{
    position:absolute;
    top:18px;
    left:18px;
    z-index:999;
    background:rgba(0,0,0,.6);
    color:white;
    padding:12px 18px;
    border-radius:10px;
    font-size:18px;
}

/* 기본 핫스팟 숨김 */

.pnlm-hotspot-base{
    background:none !important;
    border:none !important;
}

/* 새 화살표 */

.bigArrow{

    width:80px;
    height:80px;

    border-radius:50%;

    background:rgba(255,255,255,.95);

    display:flex;

    justify-content:center;
    align-items:center;

    font-size:46px;

    font-weight:bold;

    color:#222;

    box-shadow:0 0 20px rgba(0,0,0,.5);
}

/* 모바일 */

@media(max-width:768px){

.bigArrow{

    width:120px;
    height:120px;

    font-size:64px;
}

.title-box{

font-size:14px;
padding:8px 12px;

}

}

</style>
</head>

<body>

<div class="title-box">
Season3 Amtrak VR<br>
워싱턴 → 뉴욕 탑승 체험
</div>

<div id="panorama"></div>

<script>

var viewer=pannellum.viewer('panorama',{

"default":{

"firstScene":"VR1",
"sceneFadeDuration":1000,
"autoLoad":true

},

"scenes":{

"VR1":{

"title":"VR1",

"type":"equirectangular",

"panorama":"images/VR1_platform.png",

"hotSpots":[
{
"pitch":-6,
"yaw":25,
"cssClass":"bigArrow",
"createTooltipFunc":hotspot,
"createTooltipArgs":"↑",
"type":"scene",
"sceneId":"VR2"
}
]
},

"VR2":{

"type":"equirectangular",

"panorama":"images/VR2_coach_entrance.png",

"hotSpots":[

{
"pitch":-5,
"yaw":0,
"cssClass":"bigArrow",
"createTooltipFunc":hotspot,
"createTooltipArgs":"↑",
"type":"scene",
"sceneId":"VR3"
},

{
"pitch":-8,
"yaw":180,
"cssClass":"bigArrow",
"createTooltipFunc":hotspot,
"createTooltipArgs":"↓",
"type":"scene",
"sceneId":"VR1"
}

]

},

"VR3":{

"type":"equirectangular",

"panorama":"images/VR3_doorway.png",

"hotSpots":[

{
"pitch":0,
"yaw":0,
"cssClass":"bigArrow",
"createTooltipFunc":hotspot,
"createTooltipArgs":"↑",
"type":"scene",
"sceneId":"VR4"
}

]

},

"VR4":{

"type":"equirectangular",

"panorama":"images/VR4_cabin.png",

"hotSpots":[

{
"pitch":-3,
"yaw":8,
"cssClass":"bigArrow",
"createTooltipFunc":hotspot,
"createTooltipArgs":"↑",
"type":"scene",
"sceneId":"VR5"
}

]

},

"VR5":{

"type":"equirectangular",

"panorama":"images/VR5_couple_seat.png",

"hotSpots":[

{
"pitch":-5,
"yaw":180,
"cssClass":"bigArrow",
"createTooltipFunc":hotspot,
"createTooltipArgs":"↓",
"type":"scene",
"sceneId":"VR4"
}

]

}

}

});

function hotspot(div,args){

div.innerHTML=args;

}

</script>

</body>
</html>
